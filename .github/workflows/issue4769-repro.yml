name: Issue 4769 Repro
on:
  push:
    branches: [ claude/loving-brown-yqqrjg ]
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  repro:
    name: reproduce issue 4769 (expected to FAIL while the bug exists)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true
      - name: Run issue 4769 reproducers
        run: go test ./repo/maintenance/ -run 'TestPackGCDeletesPacksOf' -v -count=1 -timeout 600s
